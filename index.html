<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Spin-off of "Project: Event invite"</title>
        <style>
            body {
                background-color: #eeeeee;
                font-family: Arial, sans-serif;
                margin-top: 50px;
            }

            .container {
                background-color: white;
                width: 350px;
                margin: 0 auto;
                padding: 20px;
                border: 2px solid #3b82f6;
            }

            h1 {
                text-align: center;
                color: #1e3a8a;
                font-size: 24px;
                text-transform: uppercase;
                margin-bottom: 30px;
            }

            .row {
                margin-bottom: 15px;
                padding-bottom: 5px;
                border-bottom: 1px solid #dddddd;
            }

            .label {
                font-weight: bold;
                color: #3b82f6;
                font-size: 12px;
                display: block;
            }

            .value {
                font-size: 16px;
                display: block;
                margin-top: 5px;
            }

            .guest-list {
                margin-top: 30px;
                font-style: italic;
                text-align: center;
                color: #777777;
                font-size: 13px;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>Invitation</h1>

            <div class="row">
                <span class="label">EVENT</span>
                <span class="value">Birthday Party</span>
            </div>

            <div class="row">
                <span class="label">DATE</span>
                <span class="value">May 29, 18:00</span>
            </div>

            <div class="row">
                <span class="label">LOCATION</span>
                <span class="value">Karaganda, Kazakhstan</span>
            </div>

            <div class="guest-list">
                Guests: Alikh, Rasul, Abu, and others.
            </div>
        </div>

    </body>
</html>
